<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 获取器 ✨</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-deco">
        <span class="deco-item deco-star" style="top:8%;left:5%;">⭐</span>
        <span class="deco-item deco-heart" style="top:15%;right:8%;">💖</span>
        <span class="deco-item deco-music" style="top:70%;left:3%;">🎵</span>
        <span class="deco-item deco-cloud" style="top:80%;right:5%;">☁️</span>
        <span class="deco-item deco-sparkle" style="top:30%;left:12%;">✨</span>
        <span class="deco-item deco-ribbon" style="top:60%;right:12%;">🎀</span>
        <span class="deco-item deco-moon" style="top:45%;left:2%;">🌙</span>
        <span class="deco-item deco-flower" style="top:25%;right:3%;">🌸</span>
    </div>

    <main class="container">
        <header class="site-header">
            <div class="header-icon">🔑</div>
            <h1>Token 获取器</h1>
            <p class="subtitle">让认证这件事变得可爱一点 ~</p>
        </header>

        <section class="card main-card">
            <!-- 模式选择 -->
            <div class="control-group mode-group">
                <label class="control-label">选择平台</label>
                <div class="mode-toggle" id="modeToggle">
                    <button class="mode-btn active" data-mode="freebuff">
                        <span class="btn-emoji">🌸</span>
                        <span class="btn-text">Freebuff</span>
                    </button>
                    <button class="mode-btn" data-mode="codebuff">
                        <span class="btn-emoji">💻</span>
                        <span class="btn-text">Codebuff</span>
                    </button>
                </div>
            </div>

            <!-- 开始按钮 -->
            <button id="startBtn" class="action-btn primary-btn">
                <span class="btn-glow"></span>
                <span class="btn-content">
                    <span class="btn-icon">✨</span>
                    <span class="btn-text">开始认证</span>
                </span>
            </button>

            <!-- 登录区域 -->
            <div id="loginArea" class="area login-area hidden">
                <div class="area-icon">🌸</div>
                <p class="area-title">请在浏览器里完成登录</p>
                <a id="loginLink" href="#" target="_blank" class="login-link">
                    <span>去登录 →</span>
                </a>
                <p class="area-hint">点完记得回来哦，我会在这里等着 ~</p>
            </div>

            <!-- 状态区域 -->
            <div id="statusArea" class="area status-area hidden">
                <div class="spinner-box">
                    <div class="spinner">🌀</div>
                </div>
                <p id="statusText" class="status-text">正在等待大人登录...</p>
                <p id="statusSub" class="status-sub">第 1 次尝试</p>
            </div>

            <!-- 结果区域 -->
            <div id="resultArea" class="area result-area hidden">
                <div class="result-badge">🎉</div>
                <h2 class="result-title">拿到 token 啦！</h2>
                
                <div class="user-card">
                    <div class="user-avatar" id="userAvatar">🧸</div>
                    <div class="user-details">
                        <p class="user-name"><span class="label">名字</span><span id="userName" class="value">-</span></p>
                        <p class="user-email"><span class="label">邮箱</span><span id="userEmail" class="value">-</span></p>
                        <p class="user-id"><span class="label">账号</span><span id="userId" class="value">-</span></p>
                        <p class="user-mode"><span class="label">平台</span><span id="userMode" class="value">-</span></p>
                    </div>
                </div>

                <div class="token-section">
                    <label class="token-label">你的 Token</label>
                    <div class="token-input-group">
                        <code id="tokenDisplay" class="token-display">***</code>
                        <button id="copyBtn" class="icon-btn" title="抄走">
                            <span>📋</span>
                        </button>
                    </div>
                    <p id="copyTip" class="copy-tip hidden">已复制到剪贴板 ~</p>
                </div>

                <div class="result-actions">
                    <button id="verifyBtn" class="action-btn secondary-btn">
                        <span class="btn-icon">🔍</span>
                        <span>验一下</span>
                    </button>
                    <button id="copyEnvBtn" class="action-btn primary-btn small">
                        <span class="btn-icon">💾</span>
                        <span>复制环境变量</span>
                    </button>
                </div>
                <p id="actionTip" class="action-tip"></p>
            </div>
        </section>

        <footer class="site-footer">
            <p>made with 💖 &nbsp;|&nbsp; freebuff2api</p>
        </footer>
    </main>

    <script>
        const $ = id => document.getElementById(id);
        const modeBtns = document.querySelectorAll('.mode-btn');
        let currentMode = 'freebuff';
        let eventSource = null;
        let currentToken = '';

        // 模式切换
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
            });
        });

        // 隐藏所有区域
        function hideAreas() {
            $('loginArea').classList.add('hidden');
            $('statusArea').classList.add('hidden');
            $('resultArea').classList.add('hidden');
        }

        // 开始认证
        $('startBtn').addEventListener('click', async () => {
            hideAreas();
            $('startBtn').disabled = true;
            $('startBtn').classList.add('loading');
            $('actionTip').textContent = '';
            currentToken = '';

            try {
                const resp = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: currentMode })
                });
                const data = await resp.json();

                $('loginLink').href = data.login_url;
                $('loginArea').classList.remove('hidden');
                $('statusArea').classList.remove('hidden');

                // 打开链接
                window.open(data.login_url, '_blank');

                // SSE 轮询
                startPolling(data.fingerprint_id);
            } catch (e) {
                alert('出错了：' + e.message);
                $('startBtn').disabled = false;
                $('startBtn').classList.remove('loading');
            }
        });

        function startPolling(fid) {
            if (eventSource) eventSource.close();
            eventSource = new EventSource(`/api/poll/${fid}`);
            let attempt = 0;

            eventSource.onmessage = ev => {
                const data = JSON.parse(ev.data);
                
                if (data.event === 'pending') {
                    attempt = data.attempt;
                    $('statusText').textContent = '正在等待大人登录...';
                    $('statusSub').textContent = `第 ${attempt} 次尝试`;
                } else if (data.event === 'success') {
                    eventSource.close();
                    showResult(data.user, currentMode);
                } else if (data.event === 'timeout') {
                    eventSource.close();
                    $('statusText').textContent = '等太久了，超时了 QAQ';
                    $('statusSub').textContent = '请重新点开始认证';
                    $('startBtn').disabled = false;
                    $('startBtn').classList.remove('loading');
                } else if (data.event === 'error') {
                    eventSource.close();
                    $('statusText').textContent = '出错了：' + (data.message || '未知错误');
                    $('statusSub').textContent = '请重新尝试';
                    $('startBtn').disabled = false;
                    $('startBtn').classList.remove('loading');
                }
            };

            eventSource.onerror = () => {
                eventSource.close();
            };
        }

        function showResult(user, mode) {
            hideAreas();
            $('startBtn').disabled = false;
            $('startBtn').classList.remove('loading');
            $('resultArea').classList.remove('hidden');

            currentToken = user.authToken || '';
            $('userName').textContent = user.name || '匿名';
            $('userEmail').textContent = user.email || '无';
            $('userId').textContent = user.id || user.userId || user.sub || '无';
            $('userMode').textContent = mode === 'codebuff' ? 'Codebuff' : 'Freebuff';
            $('tokenDisplay').textContent = currentToken || '未返回 token';
            
            // 根据名字选个头像
            const avatars = ['🧸', '🐱', '🐰', '🦊', '🐼', '🐨', '🐯', '🐹'];
            const idx = (user.name || '').length % avatars.length;
            $('userAvatar').textContent = avatars[idx];
        }

        // 复制 token
        $('copyBtn').addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(currentToken);
                $('copyTip').classList.remove('hidden');
                setTimeout(() => $('copyTip').classList.add('hidden'), 2000);
            } catch {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = currentToken;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                $('copyTip').classList.remove('hidden');
                setTimeout(() => $('copyTip').classList.add('hidden'), 2000);
            }
        });

        // 验证 token
        $('verifyBtn').addEventListener('click', async () => {
            $('verifyBtn').disabled = true;
            try {
                const resp = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: currentToken })
                });
                const data = await resp.json();
                $('actionTip').textContent = data.ok ? `验证通过 ~ ${data.info}` : `验证失败：${data.info}`;
                $('actionTip').className = 'action-tip ' + (data.ok ? 'tip-ok' : 'tip-err');
            } catch (e) {
                $('actionTip').textContent = '验证请求出错：' + e.message;
                $('actionTip').className = 'action-tip tip-err';
            }
            $('verifyBtn').disabled = false;
        });

        // 复制环境变量文本
        $('copyEnvBtn').addEventListener('click', async () => {
            const envLine = `FREEBUFF_TOKEN=${currentToken}`;
            $('copyEnvBtn').disabled = true;
            try {
                await navigator.clipboard.writeText(envLine);
                $('actionTip').textContent = '已复制 FREEBUFF_TOKEN';
                $('actionTip').className = 'action-tip tip-ok';
            } catch (e) {
                $('actionTip').textContent = '复制出错：' + e.message;
                $('actionTip').className = 'action-tip tip-err';
            }
            $('copyEnvBtn').disabled = false;
        });
    </script>
</body>
</html>
